<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Available Jobs</title>
    <style>
        body {
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background: #f9fafc;
            margin: 0;
            padding: 0;
        }
        header {
            background: linear-gradient(135deg, #2980b9, #2ecc71);
            padding: 20px;
            color: white;
            text-align: center;
        }
        h1 {
            margin: 0;
            font-size: 28px;
        }
        .container {
            width: 90%;
            margin: 30px auto;
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
        }
        .card {
            background: white;
            border-radius: 10px;
            box-shadow: 0 4px 8px rgba(0,0,0,0.1);
            padding: 20px;
            transition: transform 0.2s ease-in-out;
        }
        .card:hover {
            transform: translateY(-5px);
        }
        .job-title {
            font-size: 20px;
            font-weight: bold;
            color: #2c3e50;
            margin-bottom: 10px;
        }
        .job-desc {
            font-size: 14px;
            color: #555;
            margin-bottom: 15px;
            min-height: 50px;
        }
        .job-info {
            font-size: 14px;
            margin-bottom: 5px;
            color: #333;
        }
        .salary {
            font-weight: bold;
            color: #27ae60;
        }
        .apply-btn, .applied-btn {
            display: inline-block;
            padding: 10px 18px;
            margin-top: 15px;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            text-align: center;
        }
        .apply-btn {
            background: #3498db;
            transition: background 0.3s;
            cursor: pointer;
        }
        .apply-btn:hover {
            background: #2980b9;
        }
        .applied-btn {
            background: #95a5a6;
            cursor: not-allowed;
        }
    </style>
</head>
<body>
<header>
    <h1>Available Job Openings</h1>
</header>

<div class="container">
    <div class="card" th:each="job : ${jobs}">
        <div class="job-title" th:text="${job.title}">Job Title</div>
        <div class="job-desc" th:text="${job.description}">Job Description</div>
        <div class="job-info">
            <strong>Location:</strong> <span th:text="${job.location}">City</span>
        </div>
        <div class="job-info">
            <strong>Salary:</strong> <span class="salary" th:text="${@inrFormatter.fmt(job.salary)}">₹5,000.00</span> / month
        </div>
        <div class="job-info">
            <strong>Agency:</strong> <span th:text="${job.agency.agencyName}">Agency Name</span>
        </div>

        <!-- DYNAMIC BUTTON -->
        <div th:if="${appliedJobIds.contains(job.id)}">
            <a href="#" class="applied-btn">Applied</a>
        </div>
        <div th:unless="${appliedJobIds.contains(job.id)}">
            <a th:href="@{/jobs/apply/{id}(id=${job.id})}" class="apply-btn">Apply Now</a>
        </div>
    </div>
</div>

<script th:if="${popupMessage}">
    alert('[[${popupMessage}]]');
</script>

</body>
</html>
